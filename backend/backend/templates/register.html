<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Registration - GNB</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav>
    <div class="logo">🩸 GNB</div>
</nav>

<h1 style="text-align:center; color:white; margin-top:40px; font-size:42px;">
    ❤️ Become a Blood Donor
</h1>

<p style="text-align:center; color:white; font-size:18px;">
    Your one donation can save up to three lives.
</p>

<form class="form-box" action="/register" method="POST">

    <input type="text" name="name" placeholder="👤 Enter Full Name" required>

<input type="number" name="age" placeholder="🎂 Enter Age" required>

<select name="blood_group" required>
    <option value="">🩸 Select Blood Group</option>
    <option>A+</option>
    <option>A-</option>
    <option>B+</option>
    <option>B-</option>
    <option>O+</option>
    <option>O-</option>
    <option>AB+</option>
    <option>AB-</option>
</select>

<input type="text" name="phone" placeholder="📞 Enter Phone Number" required>

    <button type="submit">❤️ Register as Donor</button>
<div style="text-align:center; margin-top:20px;">
    <a href="/">
        <button type="button">🏠 Back to Home</button>
    </a>
</div>
</form>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
